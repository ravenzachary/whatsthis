<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="history.css">
  <title>What's This? - History</title>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-left">
        <span class="logo">?</span>
        <h1>Query History</h1>
      </div>
      <div class="header-right">
        <input type="search" id="search" placeholder="Search queries..." />
        <button id="clearAll" class="clear-btn">Clear All</button>
      </div>
    </div>

    <div id="historyList" class="history-list">
      <div class="empty-state">
        <div class="empty-icon">?</div>
        <p>No queries yet. Start by selecting text on any page and choosing "What's This?" from the context menu.</p>
      </div>
    </div>
  </div>

  <script src="history.js"></script>
</body>
</html>
